<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taiwan Time Copier - Large</title>
    <style>
        :root {
            --bg-color: #000000; 
            --text-color: #ffffff;
            --accent-color: #3e82f7; 
        }

        body {
            font-family: 'Roboto Mono', monospace; /* 等寬字體避免數字跳動 */
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 95%;
            text-align: center;
        }

        /* 顯示區域優化 */
        #iso-time {
            font-weight: 700;
            margin-bottom: 30px;
            padding: 20px 10px;
            background: #111111;
            border-radius: 16px;
            line-height: 1.2;
            /* 使用 vw 讓字體在手機螢幕上盡可能大 */
            font-size: 11vw; 
            letter-spacing: -1px;
        }

        .row {
            display: block;
            width: 100%;
        }

        .copy-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            width: 100%;
            padding: 25px 0;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(62, 130, 247, 0.4);
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .copy-btn:active {
            transform: scale(0.95);
        }

        #toast {
            visibility: hidden;
            background-color: #fff;
            color: #000;
            padding: 15px 30px;
            border-radius: 50px;
            position: fixed;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            z-index: 10;
        }

        #toast.show {
            visibility: visible;
            animation: popUp 2s;
        }

        @keyframes popUp {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            20% { opacity: 1; transform: translate(-50%, 0); }
            80% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -20px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="iso-time">
            <span id="row-date" class="row">0000-00-00</span>
            <span id="row-time" class="row">T00:00:00</span>
            <span class="row">+08:00</span>
        </div>
        <button class="copy-btn" onclick="copyTime()">一鍵複製完整時間</button>
    </div>

    <div id="toast">已複製完整 ISO 時間</div>

    <script>
        function updateDisplay() {
            const now = new Date();
            const pad = (num) => String(num).padStart(2, '0');
            
            const yyyy = now.getFullYear();
            const mm = pad(now.getMonth() + 1);
            const dd = pad(now.getDate());
            const hh = pad(now.getHours());
            const min = pad(now.getMinutes());
            const ss = pad(now.getSeconds());

            document.getElementById('row-date').innerText = `${yyyy}-${mm}-${dd}`;
            document.getElementById('row-time').innerText = `T${hh}:${min}:${ss}`;
        }

        function copyTime() {
            const date = document.getElementById('row-date').innerText;
            const time = document.getElementById('row-time').innerText;
            const fullText = date + time + "+08:00";
            
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(fullText).then(() => {
                    showToast();
                });
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = fullText;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast();
            }
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.className = "show";
            setTimeout(() => { toast.className = ""; }, 2000);
        }

        setInterval(updateDisplay, 1000);
        updateDisplay();
    </script>

</body>
</html>
